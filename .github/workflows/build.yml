name: Build Windows Installer

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Setup Rust (x64 Windows MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust cargo registry and sidecar target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/sidecar/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src/sidecar/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Verify Visual Studio C++ build tools
        shell: pwsh
        run: |
          $paths = @(
            "${env:ProgramFiles}\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat",
            "${env:ProgramFiles}\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvarsall.bat",
            "${env:ProgramFiles}\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvarsall.bat",
            "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvarsall.bat"
          )
          $vcvars = $paths | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $vcvars) {
            Write-Host "VS C++ tools not found on runner; installing Build Tools via Chocolatey..."
            choco install visualstudio2022buildtools -y --no-progress `
              --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended"
            $vcvars = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvarsall.bat"
            if (-not (Test-Path $vcvars)) {
              throw "Visual Studio Build Tools install failed — vcvarsall.bat not found"
            }
          }
          Write-Host "MSVC ready: $vcvars"

      - name: Install npm dependencies
        run: npm ci

      - name: Build Rust sidecar (Stage 2 core)
        shell: pwsh
        run: npm run build:sidecar

      - name: Build Electron renderer and main
        run: npm run build:renderer && npm run build:main

      - name: Verify sidecar binary exists
        shell: pwsh
        run: |
          $exe = "src/sidecar/target/x86_64-pc-windows-msvc/release/sentinel_shield_core.exe"
          if (-not (Test-Path $exe)) { throw "Sidecar binary missing: $exe" }
          Write-Host "Sidecar ready: $exe"

      - name: Package Windows installer (NSIS x64)
        run: npx electron-builder --win nsis --x64

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SentinelShield-Windows-Installer
          path: |
            release/*.exe
            release/latest.yml
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Sentinel Shield v${{ github.run_number }}
          files: |
            release/*.exe
            release/latest.yml
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
