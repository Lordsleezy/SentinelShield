name: Build Windows Installer

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Setup Rust (x64 Windows MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install npm dependencies
        run: npm ci

      - name: Build Rust sidecar (Stage 2 core)
        shell: pwsh
        run: npm run build:sidecar

      - name: Build Electron renderer and main
        run: npm run build:renderer && npm run build:main

      - name: Verify sidecar binary exists
        shell: pwsh
        run: |
          $exe = "src/sidecar/target/x86_64-pc-windows-msvc/release/sentinel_shield_core.exe"
          if (-not (Test-Path $exe)) { throw "Sidecar binary missing: $exe" }
          Write-Host "Sidecar ready: $exe"

      - name: Package Windows installer (NSIS x64)
        run: npx electron-builder --win nsis --x64

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SentinelShield-Windows-Installer
          path: release/*.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Sentinel Shield v${{ github.run_number }}
          files: release/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
